<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gemini Usage Estimator — Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; font-size: 0.9rem; }
      input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
      .row { display: flex; gap: 0.5rem; }
      .row > div { flex: 1; }
      button { margin-top: 1rem; padding: 0.5rem 1rem; }
      small { color: #666; }
      #status { margin-left: 0.75rem; color: green; }
    </style>
  </head>
  <body>
    <h2>Gemini Usage Estimator</h2>
    <p><small>Reports estimated daily token usage from the Gemini web app to your telemetry platform. Register an <b>api</b>-type resource in the dashboard and paste its endpoint + key here.</small></p>

    <label for="endpoint">Telemetry endpoint</label>
    <input id="endpoint" placeholder="https://telemetry.example.com" />

    <label for="apiKey">API key (from the register response)</label>
    <input id="apiKey" placeholder="tk_..." />

    <div class="row">
      <div>
        <label for="costPer1kIn">Cost per 1K input tokens (USD)</label>
        <input id="costPer1kIn" type="number" step="0.0001" placeholder="0" />
      </div>
      <div>
        <label for="costPer1kOut">Cost per 1K output tokens (USD)</label>
        <input id="costPer1kOut" type="number" step="0.0001" placeholder="0" />
      </div>
    </div>
    <small>Leave costs at 0 for the free web app; set them if you want an estimated dollar figure.</small>

    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
