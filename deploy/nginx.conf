# nginx reverse proxy for the telemetry platform.
#   - serves the built Angular dashboard,
#   - proxies /api and /healthz to the Express server,
#   - upgrades /ws to the WebSocket server.
# Obtain TLS certs via certbot (or use Caddy for automatic HTTPS).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name telemetry.example.com;
  # Redirect everything to HTTPS (except ACME challenges).
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name telemetry.example.com;

  ssl_certificate     /etc/letsencrypt/live/telemetry.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/telemetry.example.com/privkey.pem;

  # --- Angular dashboard (static build output) ---
  root /var/www/telemetry-dashboard;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;   # SPA fallback
  }

  # --- REST API + health ---
  location ~ ^/(api|healthz) {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- WebSocket (live compute metrics) ---
  location /ws {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;   # keep long-lived sockets open
  }
}
