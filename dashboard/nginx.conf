# In-container nginx: serve the Angular SPA and reverse-proxy the API + WebSocket
# to the "server" service on the compose network. This is the single public
# entrypoint (port 80); the server and postgres containers stay internal.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routes fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST API + health check.
  location ~ ^/(api|healthz) {
    proxy_pass http://server:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket (live compute metrics).
  location /ws {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }
}
